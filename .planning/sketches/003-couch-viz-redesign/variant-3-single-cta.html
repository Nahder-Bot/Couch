<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Couch Viz — Variant 3: Single CTA + Thin Roster</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500&family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================================
   VARIANT 3: SINGLE CTA + THIN ROSTER UNDERLINE
   ----------------------------------------------------------------------------
   Problem solved: Maximum restraint. The hero IS the action — one big pill
   button that flips between "Find a seat" / "Leave couch" based on me-state.
   Roster shown as a thin micro-avatar row below for awareness, not as primary
   control. The most "Apple Health"-feeling option.

   Dual-mode tradeoff:
     ✓ Self-claim — One tap on the big CTA. Most ergonomic.
     ⚠ Proxy-fill — Tap a micro-avatar to toggle that member. But the micro
       size makes it less inviting / less obvious as a tap target.
     ✓ Remote ping — "Send pushes" appears as a secondary text link below.
     ✗ De-emphasizes the family roster as primary input. Proxy mode feels
       like a power-user move rather than a first-class flow.

   Intentionally cut: Per-cushion grid. Per-member visible state at hero size.
   The "row of seats" metaphor entirely.
   ============================================================================ */

* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #14110f;
  --surface: #1f1a16;
  --surface-elev: #2a241f;
  --border-soft: #2a241f;
  --text: #f5ede1;
  --text-muted: #b3a797;
  --text-dim: #6e6356;
  --warm-amber: #d4a574;
  --r-pill: 999px;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', system-ui, sans-serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

body {
  padding: 32px 24px 120px;
  max-width: 720px;
  margin: 0 auto;
}

.state-toggle { display: flex; gap: 4px; margin-bottom: 32px; background: var(--surface); border-radius: var(--r-pill); padding: 4px; width: fit-content; font-size: 12px; }
.state-toggle button { background: transparent; border: 0; color: var(--text-muted); padding: 6px 14px; border-radius: var(--r-pill); font-family: inherit; font-size: 12px; cursor: pointer; transition: color 120ms, background 120ms; }
.state-toggle button.active { background: var(--surface-elev); color: var(--text); }

.hero {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 28px;
}
.hero-icon {
  width: 96px;
  height: 96px;
  margin-bottom: 18px;
  border-radius: 22px;
  filter: drop-shadow(0 18px 36px rgba(0,0,0,0.5));
}
.couch-headline {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 500;
  font-size: 1.85rem;
  letter-spacing: -0.02em;
  margin-bottom: 8px;
  text-align: center;
}
.couch-sub {
  font-family: 'Instrument Serif', Georgia, serif;
  font-style: italic;
  color: var(--text-muted);
  font-size: 1.1rem;
  text-align: center;
  margin-bottom: 32px;
}

/* === The hero CTA — big, single, decisive === */
.hero-cta {
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: 17px;
  padding: 20px 44px;
  border-radius: var(--r-pill);
  border: 0;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: transform 180ms cubic-bezier(0.2, 0.8, 0.4, 1), filter 180ms, background 240ms;
  -webkit-tap-highlight-color: transparent;
  letter-spacing: -0.01em;
  margin: 0 auto 18px;
  min-width: 220px;
}
.hero-cta.find {
  background: linear-gradient(135deg, #f59e0b 0%, #d4a574 100%);
  color: #1a1410;
  box-shadow: 0 12px 32px rgba(217, 122, 60, 0.45);
}
.hero-cta.leave {
  background: var(--surface-elev);
  color: var(--text);
  border: 1px solid var(--warm-amber);
  box-shadow: none;
}
.hero-cta:hover { transform: translateY(-2px); filter: brightness(1.06); }
.hero-cta:active { transform: translateY(0); }

/* === Thin roster underline === */
.roster-thin {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 6px;
  margin-bottom: 16px;
  flex-wrap: wrap;
  max-width: 480px;
  margin-left: auto;
  margin-right: auto;
}
.micro {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Inter';
  font-weight: 600;
  font-size: 12px;
  color: white;
  cursor: pointer;
  position: relative;
  transition: transform 180ms, opacity 180ms, filter 180ms;
  border: 2px solid var(--bg);
  -webkit-tap-highlight-color: transparent;
}
.micro:hover { transform: scale(1.18); z-index: 5; }
.micro.out {
  opacity: 0.32;
  filter: grayscale(70%);
}
.micro.in {
  opacity: 1;
  filter: none;
  box-shadow: 0 4px 10px rgba(0,0,0,0.4);
}
.micro.me { outline: 2px solid var(--warm-amber); outline-offset: 1px; }
.micro .tt {
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--surface-elev);
  color: var(--text);
  font-size: 11px;
  padding: 4px 8px;
  border-radius: 4px;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity 120ms;
}
.micro:hover .tt { opacity: 1; }

.tally-line {
  text-align: center;
  font-family: 'Instrument Serif', Georgia, serif;
  font-style: italic;
  color: var(--text-muted);
  font-size: 0.95rem;
  margin-bottom: 14px;
}
.tally-line .num { color: var(--warm-amber); font-style: normal; font-family: 'Inter'; font-weight: 600; }

.send-link {
  text-align: center;
  margin-bottom: 24px;
}
.send-link button {
  background: transparent;
  border: 0;
  color: var(--text-dim);
  font-family: inherit;
  font-size: 13px;
  cursor: pointer;
  text-decoration: underline;
  text-decoration-color: var(--border-soft);
  text-underline-offset: 4px;
  transition: color 120ms, text-decoration-color 120ms;
}
.send-link button:hover { color: var(--warm-amber); text-decoration-color: var(--warm-amber); }

.explainer {
  position: fixed; top: 12px; left: 12px;
  background: rgba(31, 26, 22, 0.92); backdrop-filter: blur(8px);
  border: 1px solid var(--border-soft); padding: 10px 14px; border-radius: 10px;
  font-size: 11px; color: var(--text-muted); max-width: 280px; line-height: 1.5; z-index: 100;
}
.explainer strong { color: var(--warm-amber); display: block; margin-bottom: 4px; font-family: 'Fraunces', serif; font-size: 13px; }

#sketch-tools {
  position: fixed; bottom: 12px; right: 12px; z-index: 9999;
  font-family: system-ui; font-size: 12px;
  background: rgba(0,0,0,0.78); color: white;
  padding: 8px 12px; border-radius: 8px;
  opacity: 0.45; transition: opacity 200ms;
  display: flex; gap: 8px; align-items: center;
}
#sketch-tools:hover { opacity: 1; }
#sketch-tools button { background: rgba(255,255,255,0.1); color: white; border: 0; padding: 4px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; font-family: inherit; }
#sketch-tools button.active { background: var(--warm-amber); color: #1a1410; }

@media (max-width: 480px) {
  body { padding: 20px 16px 100px; }
  .couch-headline { font-size: 1.55rem; }
  .hero-cta { font-size: 15px; padding: 16px 32px; min-width: 180px; }
  .micro { width: 28px; height: 28px; font-size: 11px; }
  .explainer { display: none; }
}
</style>
</head>
<body>

<div class="explainer">
  <strong>Variant 3 — Single CTA</strong>
  Hero icon + Fraunces headline + ONE big pill button (Find a seat / Leave couch). Roster as a thin micro-avatar underline below.
</div>

<div class="state-toggle" role="tablist">
  <button data-state="empty" class="active">0 in</button>
  <button data-state="me-only">Me only</button>
  <button data-state="mixed">4 of 8 in</button>
</div>

<div class="hero">
  <svg class="hero-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="floorGlow3" cx="68%" cy="60%" r="40%">
        <stop offset="0%" stop-color="#f4b860" stop-opacity="0.55"/>
        <stop offset="100%" stop-color="#d4a574" stop-opacity="0"/>
      </radialGradient>
      <linearGradient id="leather3" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#a06a45"/>
        <stop offset="100%" stop-color="#7a4d2f"/>
      </linearGradient>
    </defs>
    <rect x="2" y="2" width="96" height="96" rx="18" fill="#1a120c"/>
    <circle cx="68" cy="60" r="32" fill="url(#floorGlow3)"/>
    <path d="M 25 30 Q 25 22 33 22 L 55 22 Q 60 22 60 28 L 60 38 Q 60 44 65 44 L 70 44 Q 75 44 75 50 L 75 70 Q 75 76 67 76 L 33 76 Q 25 76 25 68 Z" fill="url(#leather3)" stroke="#5d3820" stroke-width="0.6"/>
    <rect x="78" y="48" width="3" height="12" fill="#d4a574"/>
    <circle cx="79.5" cy="46" r="4" fill="#f4b860"/>
  </svg>
  <h1 class="couch-headline">On the couch tonight</h1>
  <p class="couch-sub" id="sub-line">Pull up a seat</p>

  <button class="hero-cta find" id="hero-cta">Find a seat</button>
</div>

<div class="roster-thin" id="roster-thin"></div>
<p class="tally-line"><span class="num" id="count-num">0</span> of 8 watching</p>
<div class="send-link" id="send-link">
  <button onclick="alert('Sketch: would open share/push sheet to N members')">Send pushes to the rest</button>
</div>

<div id="sketch-tools">
  <span style="opacity:0.6">viewport</span>
  <button onclick="setViewport(375)">📱</button>
  <button onclick="setViewport(768)">▭</button>
  <button onclick="setViewport(1280)" class="active">🖥</button>
</div>

<script>
const FAMILY = [
  { id: 'me',    name: 'Nahder',  initial: 'N', color: '#8b5cf6', isMe: true  },
  { id: 'wife',  name: 'Ashley',  initial: 'A', color: '#ec4899', isMe: false },
  { id: 'kid1',  name: 'Brody',   initial: 'B', color: '#f59e0b', isMe: false },
  { id: 'kid2',  name: 'Arianna', initial: 'A', color: '#14b8a6', isMe: false },
  { id: 'mom',   name: 'Mom',     initial: 'M', color: '#3b82f6', isMe: false },
  { id: 'dad',   name: 'Dad',     initial: 'D', color: '#22c55e', isMe: false },
  { id: 'tyler', name: 'Tyler',   initial: 'T', color: '#ef4444', isMe: false },
  { id: 'sam',   name: 'Sam',     initial: 'S', color: '#6366f1', isMe: false },
];
let inState = new Set();

function render() {
  const num = inState.size;
  document.getElementById('count-num').textContent = num;

  const sub = document.getElementById('sub-line');
  if (num === 0) sub.textContent = 'Pull up a seat';
  else if (num === 1 && inState.has('me')) sub.textContent = "It's just you so far";
  else sub.textContent = `${num} ${num === 1 ? 'person' : 'people'} watching tonight`;

  const cta = document.getElementById('hero-cta');
  if (inState.has('me')) {
    cta.className = 'hero-cta leave';
    cta.textContent = 'Leave couch';
  } else {
    cta.className = 'hero-cta find';
    cta.textContent = 'Find a seat';
  }

  const roster = document.getElementById('roster-thin');
  roster.innerHTML = '';
  FAMILY.forEach(m => {
    const isIn = inState.has(m.id);
    const a = document.createElement('div');
    a.className = `micro ${isIn ? 'in' : 'out'} ${m.isMe ? 'me' : ''}`;
    a.style.background = m.color;
    a.textContent = m.initial;
    a.onclick = () => toggle(m.id);
    const tt = document.createElement('span');
    tt.className = 'tt';
    tt.textContent = m.name + (m.isMe ? ' (you)' : '');
    a.appendChild(tt);
    roster.appendChild(a);
  });

  const out = FAMILY.length - num;
  document.getElementById('send-link').style.display = out > 0 ? '' : 'none';
}

function toggle(id) {
  if (inState.has(id)) inState.delete(id);
  else inState.add(id);
  render();
}

document.getElementById('hero-cta').onclick = () => toggle('me');

document.querySelectorAll('.state-toggle button').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.state-toggle button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const state = btn.dataset.state;
    inState = new Set();
    if (state === 'me-only') inState.add('me');
    if (state === 'mixed') ['me', 'wife', 'kid1', 'kid2'].forEach(id => inState.add(id));
    render();
  };
});

function setViewport(w) {
  document.body.style.maxWidth = w === 1280 ? '720px' : (w + 'px');
  document.querySelectorAll('#sketch-tools button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

render();
</script>
</body>
</html>
